name: Sync Install Index

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  delete:
  release:
    types: [published, unpublished, deleted]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  sync-branches-json:
    name: Sync branches.json (branches + releases)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Ensure required secrets are configured
        run: |
          set -euo pipefail
          for key in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ENDPOINT_URL; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret/env for ${key}" >&2
              exit 1
            fi
          done

      - name: Install aws cli tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install awscli

      - name: Generate branches.json from GitHub API
        run: |
          mkdir -p _work/index
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          branches = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repo}/branches?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  batch = json.loads(resp.read().decode("utf-8"))
              if not batch:
                  break
              branches.extend(str(item.get("name", "")).strip() for item in batch)
              if len(batch) < 100:
                  break
              page += 1

          releases = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repo}/releases?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  batch = json.loads(resp.read().decode("utf-8"))
              if not batch:
                  break
              for rel in batch:
                  if rel.get("draft"):
                      continue
                  tag = str(rel.get("tag_name", "")).strip()
                  if tag:
                      releases.append(tag)
              if len(batch) < 100:
                  break
              page += 1

          payload = {
              "branches": sorted({b for b in branches if b}),
              "releases": sorted({r for r in releases if r}),
          }
          out = Path("_work/index/branches.json")
          out.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(payload, indent=2))
          print(f"Wrote {out}")
          PY

      - name: Upload branches.json to R2
        run: |
          aws s3 cp \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            _work/index/branches.json \
            s3://neat-artifacts/insight/download/branches.json \
            --content-type application/json
