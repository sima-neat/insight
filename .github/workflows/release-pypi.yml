name: Release To PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built wheels to PyPI"
        required: true
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: release-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify Tag Ref
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      expected_version: ${{ steps.ver.outputs.expected_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs on a tag
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "This workflow must be dispatched from a tag ref." >&2
            echo "Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            expected="${BASH_REMATCH[1]}"
          elif [[ "${tag}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            expected="${BASH_REMATCH[1]}"
          else
            echo "Tag must match vX.Y.Z or X.Y.Z, got: ${tag}" >&2
            exit 1
          fi

          echo "expected_version=${expected}" >> "${GITHUB_OUTPUT}"
          echo "Tag accepted: ${tag} -> version ${expected}"

      - name: Ensure tag commit is on main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${tag_commit}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} (${tag_commit}) is not reachable from origin/main." >&2
            exit 1
          fi
          echo "Tag commit is on main."

  build:
    name: Build ${{ matrix.target_platform }}
    runs-on: ubuntu-latest
    needs: verify-tag
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        target_platform:
          - linux-amd64
          - linux-aarch64
          - macos-arm64
          - windows-amd64

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.5"
          cache: false

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Build wheel
        run: |
          chmod +x ./build.sh
          ./build.sh --target-platform "${{ matrix.target_platform }}"

      - name: Validate wheel version equals tag version
        env:
          EXPECTED_VERSION: ${{ needs.verify-tag.outputs.expected_version }}
        run: |
          python3 - <<'PY'
          import glob
          import os
          import sys

          expected = os.environ["EXPECTED_VERSION"]
          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly 1 wheel for this build job, found {len(wheels)}")
          wheel = wheels[0].split("/")[-1]
          parts = wheel.split("-")
          if len(parts) < 2:
              raise SystemExit(f"Unexpected wheel filename: {wheel}")
          version = parts[1]
          if version != expected:
              raise SystemExit(f"Wheel version {version} does not match expected tag version {expected}")
          print(f"Wheel version validated: {version}")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target_platform }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs: [verify-tag, build]
    if: ${{ github.event_name == 'release' || inputs.publish }}
    environment: PyPi
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      TWINE_NON_INTERACTIVE: "1"
    steps:
      - name: Ensure PyPI token is configured
        run: |
          set -euo pipefail
          if [[ -z "${TWINE_PASSWORD}" ]]; then
            echo "Missing secrets.PYPI_API_TOKEN" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Inspect wheels
        run: |
          ls -lah dist
          count=$(find dist -maxdepth 1 -name '*.whl' | wc -l | tr -d ' ')
          if [[ "${count}" -lt 4 ]]; then
            echo "Expected at least 4 wheels, found ${count}" >&2
            exit 1
          fi

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*.whl

      - name: Upload to PyPI
        run: |
          python -m twine upload dist/*.whl
