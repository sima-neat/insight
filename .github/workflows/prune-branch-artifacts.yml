name: Prune Branch Artifacts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no deletions)"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "35 3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  prune:
    name: Delete non-latest branch artifacts older than 48h
    uses: sima-neat/.github/.github/workflows/reusable-prune-download-artifacts.yml@main
    with:
      bucket: neat-artifacts
      artifact_root: insight/download
      keep_hours: 48
      dry_run: ${{ inputs.dry_run || false }}
      aws_region: auto
      endpoint_url: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    secrets:
      aws_access_key_id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      aws_secret_access_key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
